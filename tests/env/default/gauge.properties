# Gauge Configuration for TabShare E2E Tests

# Browser settings
BROWSER = chrome
HEADLESS = false

# Extension path (relative to project root)
EXTENSION_PATH = ./extension/.output/chrome-mv3

# Viewer URL
VIEWER_URL = http://localhost:4321

# Step timeout in milliseconds
STEP_TIMEOUT = 30000

# Gauge execution settings
gauge_execution_strategy = parallel
gauge_parallel_execution_count = 2

# Report settings
gauge_reports_dir = reports
gauge_reports.overwrite = true

# Logging settings
LOG_LEVEL = info
LOG_DIR = logs

# Screenshots
SCREENSHOT_ON_FAILURE = true
SCREENSHOT_DIR = screenshots

# Test data
FIXTURES_DIR = fixtures

# Environment
NODE_ENV = test
